
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма данных амбулаторного больного</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: 
                linear-gradient(rgba(102, 126, 234, 0.7), rgba(118, 75, 162, 0.7)),
                url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 1200px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            font-weight: 500;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: #667eea;
        }
        
        /* Стили таблицы */
        .table-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }
        
        .table-section h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
        }
        
        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 13px;
        }
        
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        th {
            padding: 12px 10px;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
        }
        
        td {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
            color: #444;
        }
        
        tbody tr:hover {
            background: #f8f9ff;
        }
        
        tbody tr:nth-child(even) {
            background: #f9f9f9;
        }
        
        tbody tr:nth-child(even):hover {
            background: #f0f2ff;
        }
        
        .empty-msg {
            text-align: center;
            color: #999;
            padding: 30px;
            font-style: italic;
        }
        
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .delete-btn:hover {
            background: #c0392b;
        }
        
        @media (max-width: 600px) {
            .row {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Форма данных амбулаторного больного</h1>
        <p class="subtitle">Болеть незя дорого это нынче</p>
        
        <form id="dataForm">
            <div class="row">
                <div class="form-group">
                    <label for="field1">П/п *</label>
                    <input type="text" id="field1" name="field1" required placeholder="Порядковый номер">
                </div>
                <div class="form-group">
                    <label for="field2">Номер амбулаторной карты *</label>
                    <input type="text" id="field2" name="field2" required placeholder="Номер амбулаторной карты">
                </div>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label for="field3">ФИО *</label>
                    <input type="text" id="field3" name="field3" required placeholder="Иванов Иван Иванович">
                </div>
                <div class="form-group">
                    <label for="field4">Дата рождения</label>
                    <input type="date" id="field4" name="field4">
                </div>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label for="field5">СНИЛС</label>
                    <input type="text" id="field5" name="field5" placeholder="001-234-567 89" maxlength="16">
                </div>
                <div class="form-group">
                    <label for="field6">ОМС</label>
                    <input type="text" id="field6" name="field6" placeholder="001-234-567 89" maxlength="16">
                </div>
            </div>
            
            <div class="form-group">
                <label for="field7">Код пациента</label>
                <select id="field7" name="field7">
                    <option value="">-- Выберите --</option>
                    <option value="111">111 (военные)</option>
                    <option value="000">000 (гражданские)</option>
                </select>
            </div>
    
            <div class="form-group">
                <label for="field8">Прописка</label>
                <input type="text" id="field8" name="field8" placeholder="улица/дом/квартира">
            </div>
            
            <div class="form-group">
                <label for="field10">Код по МКБ</label>
                <input type="text" id="field10" name="field10">
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label for="field9">Работает</label>
                    <input type="text" id="field9" name="field9" placeholder="работа, учеба">
                </div>
                <div class="form-group">
                    <label for="field11">Код начала лечения</label>
                    <input type="text" id="field11" name="field11">
                </div>
            </div>
            
            <div class="form-group">
                <label for="field12">код при выздоровлении</label>
                <input type="text" id="field12" name="field12">
            </div>
        
            <div class="form-group">
                <label for="field13">Амбулаторная карта</label>
                <select id="field13" name="field13">
                    <option value="">-- Выберите --</option>
                    <option value="на руки">на руки</option>
                    <option value="в регистратуру">в регистратуру</option>
                    <option value="в кабинете">в кабинете</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">📤 Отправить в базу</button>
            <div class="loading" id="loading">⏳ Отправка данных...</div>
            <div class="status" id="status"></div>
        </form>

        <!-- Таблица данных -->
        <div class="table-section">
            <h2>📊 Таблица пациентов</h2>
            <div class="table-container">
                <table id="patientsTable">
                    <thead>
                        <tr>
                            <th>№</th>
                            <th>П/п</th>
                            <th>№ карты</th>
                            <th>ФИО</th>
                            <th>Дата рожд.</th>
                            <th>СНИЛС</th>
                            <th>ОМС</th>
                            <th>Код</th>
                            <th>Прописка</th>
                            <th>МКБ</th>
                            <th>Работает</th>
                            <th>Начало лечения</th>
                            <th>Исход лечения</th>
                            <th>Карта</th>
                            <th>Действие</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="15" class="empty-msg">Пока нет данных — заполните форму выше</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZVVUmpsSRSrgbQpYarXECfdEmuve_6cA6SIlKO8jt-Wt9rbfuRdYfge3VsS8AxZuSSQ/exec';
        
        // Хранилище данных в памяти
        let patientsData = [];
        
        // Отображение таблицы
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            
            if (patientsData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="15" class="empty-msg">Пока нет данных — заполните форму выше</td></tr>';
                return;
            }
            
            tbody.innerHTML = patientsData.map((p, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${p.field1 || ''}</td>
                    <td>${p.field2 || ''}</td>
                    <td>${p.field3 || ''}</td>
                    <td>${p.field4 || ''}</td>
                    <td>${p.field5 || ''}</td>
                    <td>${p.field6 || ''}</td>
                    <td>${p.field7 || ''}</td>
                    <td>${p.field8 || ''}</td>
                    <td>${p.field10 || ''}</td>
                    <td>${p.field9 || ''}</td>
                    <td>${p.field11 || ''}</td>
                    <td>${p.field12 || ''}</td>
                    <td>${p.field13 || ''}</td>
                    <td><button class="delete-btn" onclick="deleteRow(${index})">🗑️</button></td>
                </tr>
            `).join('');
        }
        
        // Удаление строки
        window.deleteRow = function(index) {
            if (confirm('Удалить эту запись?')) {
                patientsData.splice(index, 1);
                renderTable();
            }
        };
        
        document.getElementById('dataForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const status = document.getElementById('status');
            
            // Собираем данные из формы
            const formData = {
                field1: document.getElementById('field1').value,
                field2: document.getElementById('field2').value,
                field3: document.getElementById('field3').value,
                field4: document.getElementById('field4').value,
                field5: document.getElementById('field5').value,
                field6: document.getElementById('field6').value,
                field7: document.getElementById('field7').value,
                field8: document.getElementById('field8').value,
                field9: document.getElementById('field9').value,
                field10: document.getElementById('field10').value,
                field11: document.getElementById('field11').value,
                field12: document.getElementById('field12').value,
                field13: document.getElementById('field13').value,
            };
            
            // Добавляем в локальную таблицу
            patientsData.push(formData);
            renderTable();
            
            if (GOOGLE_SCRIPT_URL === 'ВАШ_URL_ВЕБ_ПРИЛОЖЕНИЯ_ЗДЕСЬ') {
                status.className = 'status error';
                status.textContent = '❌ Ошибка: Укажите URL веб-приложения в коде';
                status.style.display = 'block';
                return;
            }
            
            const formDataObj = new FormData();
            Object.keys(formData).forEach(key => {
                formDataObj.append(key, formData[key]);
            });
            
            submitBtn.disabled = true;
            loading.style.display = 'block';
            status.style.display = 'none';
            
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: formDataObj
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    status.className = 'status success';
                    status.textContent = '✅ ' + result.message;
                    document.getElementById('dataForm').reset();
                } else {
                    throw new Error(result.message);
                }
                
            } catch (error) {
                status.className = 'status error';
                status.textContent = '❌ Ошибка: ' + error.message;
                console.error('Ошибка:', error);
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
                status.style.display = 'block';
                
                setTimeout(() => {
                    status.style.display = 'none';
                }, 5000);
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма данных амбулаторного больного</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 600px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: 600; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .status {
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            font-weight: 500;
        }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .loading { display: none; text-align: center; margin-top: 10px; color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Форма данных амбулаторного больного</h1>
        <p class="subtitle">Все данные сохраняются в Google Sheets</p>
        
        <form id="dataForm">
            <div class="row">
                <div class="form-group">
                    <label>Порядковый номер *</label>
                    <input type="text" id="field1" required placeholder="Порядковый номер">
                </div>
                <div class="form-group">
                    <label>Номер амбулаторной карты *</label>
                    <input type="text" id="field2" required placeholder="Номер карты">
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>ФИО *</label>
                    <input type="text" id="field3" required placeholder="Иванов Иван Иванович">
                </div>
                <div class="form-group">
                    <label>Дата Обращения</label>
                    <input type="date" id="field4">
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>СНИЛС</label>
                    <input type="text" id="field5" placeholder="001-234-567 89" maxlength="16">
                </div>
                <div class="form-group">
                    <label>ОМС</label>
                    <input type="text" id="field6" placeholder="001-234-567 89" maxlength="16">
                </div>
            </div>
            <div class="form-group">
                <label>Код пациента</label>
                <select id="field7">
                    <option value="">-- Выберите --</option>
                    <option value="111">111 (военные)</option>
                    <option value="000">000 (гражданские)</option>
                </select>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Работает</label>
                    <input type="text" id="field8" placeholder="работа, учеба">
                </div>
                <div class="form-group">
                    <label>Амбулаторная карта</label>
                    <select id="field9">
                        <option value="">-- Выберите --</option>
                        <option value="на руки">на руки</option>
                        <option value="в регистратуру">в регистратуру</option>
                        <option value="в кабинете">в кабинете</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submitBtn">📤 Отправить в базу</button>
            <div class="loading" id="loading">⏳ Отправка данных...</div>
            <div class="status" id="status"></div>
        </form>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZVVUmpsSRSrgbQpYarXECfdEmuve_6cA6SIlKO8jt-Wt9rbfuRdYfge3VsS8AxZuSSQ/exec';
        
        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const status = document.getElementById('status');
            
            submitBtn.disabled = true;
            loading.style.display = 'block';
            status.style.display = 'none';
            
            // Создаём скрытый iframe
            const iframe = document.createElement('iframe');
            iframe.name = 'hidden-iframe';
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            // Создаём форму для отправки
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = GOOGLE_SCRIPT_URL;
            form.target = 'hidden-iframe';
            
            // Добавляем поля
            const fields = ['field1', 'field2', 'field3', 'field4', 'field5', 'field6', 'field7', 'field8', 'field9'];
            fields.forEach(field => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = field;
                input.value = document.getElementById(field).value;
                form.appendChild(input);
            });
            
            document.body.appendChild(form);
            form.submit();
            
            // Показываем успех
            setTimeout(function() {
                status.className = 'status success';
                status.textContent = '✅ Данные успешно отправлены!';
                status.style.display = 'block';
                submitBtn.disabled = false;
                loading.style.display = 'none';
                document.getElementById('dataForm').reset();
                
                document.body.removeChild(form);
                document.body.removeChild(iframe);
            }, 2000);
        });
    </script>
</body>
</html>
